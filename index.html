<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>Taxi Radar Pro</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* === RESET & BASE === */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #050505; color: #fff; overflow: hidden; overscroll-behavior-y: none; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        button { border: none; background: none; color: inherit; cursor: pointer; outline: none; }

        /* === TYPOGRAPHY === */
        .text-demand { color: #C026D3; }
        .text-white { color: #ffffff; }
        .text-gray { color: #a1a1aa; }
        .text-sm { font-size: 0.875rem; }
        .text-xs { font-size: 0.75rem; }
        .font-bold { font-weight: 700; }
        .font-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        
        /* Cinematic Author Font */
        .cinematic-author {
            font-family: 'Oswald', sans-serif;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        /* === LAYOUT UTILS === */
        .flex { display: flex; }
        .flex-col { display: flex; flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .justify-center { justify-content: center; }
        .gap-2 { gap: 0.5rem; }
        .gap-4 { gap: 1rem; }

        /* === GLASSMORPHISM === */
        .glass {
            background: rgba(18, 18, 22, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
        }

        /* === PRELOADER === */
        #preloader {
            position: fixed; inset: 0; z-index: 100000;
            background: #050505;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .taxi-spinner {
            position: relative; width: 120px; height: 120px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; border: 1px solid rgba(192, 38, 211, 0.2);
            box-shadow: inset 0 0 30px rgba(192, 38, 211, 0.1);
            margin-bottom: 20px;
        }
        .taxi-spinner i { font-size: 3rem; color: #fff; z-index: 5; text-shadow: 0 0 15px rgba(192, 38, 211, 0.8); }
        .taxi-sweep {
            position: absolute; inset: 0; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 70%, rgba(192, 38, 211, 0.8) 100%);
            animation: spin 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* === COMPONENTS === */
        /* Start Screen */
        #start-screen {
            position: absolute; inset: 0; z-index: 9999;
            background: radial-gradient(circle at center, rgba(192,38,211,0.1) 0%, #050505 80%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s;
        }
        .btn-primary {
            background: #fff; color: #000; font-weight: bold; font-size: 1.1rem;
            padding: 1rem 3rem; border-radius: 50px;
            box-shadow: 0 0 30px rgba(192, 38, 211, 0.3); transition: transform 0.2s;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .btn-primary:active { transform: scale(0.95); }

        /* Map */
        #map { position: absolute; inset: 0; z-index: 0; }

        /* Parametric Corners (Top-Left & Top-Right) */
        .corner-widget {
            position: absolute; z-index: 1000; padding: 12px 16px; border-radius: 16px;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s;
        }
        #top-left-panel { top: 12px; left: 12px; }
        #top-right-panel { top: 12px; right: 12px; display: flex; flex-direction: column; align-items: flex-end; }
        
        .weather-badge {
            background: rgba(255,255,255,0.05); padding: 6px 10px; border-radius: 10px;
            display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: #d4d4d8;
            margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05);
        }

        /* Live Radar Panel */
        #live-radar {
            position: absolute; top: 100px; left: 12px; z-index: 500;
            width: 260px; border-radius: 16px; padding: 14px;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s;
        }
        .radar-header { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; margin-bottom: 8px; }

        /* Floating Actions (FAB) */
        #fab-actions {
            position: absolute; top: 140px; right: 12px; z-index: 400;
            display: flex; flex-direction: column; gap: 12px;
            transition: opacity 0.6s;
        }
        .fab-btn {
            width: 48px; height: 48px; border-radius: 50%; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s, background 0.3s;
        }
        .fab-btn:active { transform: scale(0.9); }

        /* Animated Radar Widget (Bottom Right) */
        #radar-widget {
            position: absolute; bottom: 20px; right: 16px; z-index: 400;
            width: 70px; height: 70px; border-radius: 50%;
            overflow: hidden; border: 1px solid rgba(192, 38, 211, 0.4);
            box-shadow: 0 0 20px rgba(192, 38, 211, 0.2);
            transition: opacity 0.6s;
            pointer-events: none;
        }
        .radar-sweep-widget {
            position: absolute; top: 0; left: 50%; width: 35px; height: 35px;
            background: conic-gradient(from 90deg, transparent 0deg, rgba(192, 38, 211, 0.8) 90deg);
            transform-origin: 0% 100%; animation: spin 2s linear infinite;
        }
        .radar-ring {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border-radius: 50%; border: 1px solid rgba(192, 38, 211, 0.3);
            width: 100%; height: 100%;
        }
        .radar-ring.inner { width: 50%; height: 50%; }

        /* Bottom Sheet */
        #bottom-sheet {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
            height: 38vh; border-radius: 24px 24px 0 0; padding: 0 16px;
            display: flex; flex-direction: column;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            touch-action: none;
        }
        .drag-handle { width: 100%; padding: 16px 0; display: flex; justify-content: center; cursor: grab; }
        .drag-bar { width: 40px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 10px; }
        
        .events-list { flex-grow: 1; overflow-y: auto; padding-bottom: 20px; display: flex; flex-direction: column; gap: 12px; }
        .event-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; padding: 14px; transition: background 0.2s;
            position: relative; overflow: hidden;
        }
        .event-card::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #C026D3; opacity: 0.7;
        }
        .event-card:active { background: rgba(255,255,255,0.08); }
        .price-tag { background: rgba(192,38,211,0.2); color: #C026D3; padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 0.75rem; }

        /* Auto-Hide Classes */
        .hide-top { transform: translateY(-150%); opacity: 0; pointer-events: none; }
        .hide-left { transform: translateX(-150%); opacity: 0; pointer-events: none; }
        .hide-bottom { transform: translateY(100%); pointer-events: none; }
        .opacity-0 { opacity: 0; pointer-events: none; visibility: hidden; }
        .d-none { display: none !important; }

        /* Leaflet Overrides */
        .leaflet-control-attribution, .leaflet-control-zoom { display: none !important; }
        .leaflet-popup-content-wrapper {
            background: rgba(18, 18, 22, 0.95) !important; backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(192, 38, 211, 0.4) !important; color: #fff !important;
            border-radius: 16px !important; padding: 0 !important; box-shadow: 0 15px 35px rgba(0,0,0,0.8) !important;
        }
        .leaflet-popup-tip-container { display: none; }
        .leaflet-popup-content { margin: 0 !important; min-width: 260px; padding: 16px !important; }
        .leaflet-container a.leaflet-popup-close-button { color: #a1a1aa; padding: 16px; z-index: 10; font-size: 20px; }

        /* Map Animations */
        .demand-zone { transition: fill-opacity 0.4s ease; transform-origin: center; animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, circle-shimmer 3s infinite alternate ease-in-out 0.6s; opacity: 0; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.5); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes circle-shimmer {
            0% { fill-opacity: 0.15; filter: drop-shadow(0 0 5px rgba(192,38,211,0.2)); opacity: 1; transform: scale(1); }
            100% { fill-opacity: 0.4; filter: drop-shadow(0 0 20px rgba(192,38,211,0.6)); opacity: 1; transform: scale(1.02); }
        }
        .route-line { animation: route-dash 1.5s linear infinite; }
        @keyframes route-dash { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }
        
        .pulse-dot { width: 8px; height: 8px; background: #C026D3; border-radius: 50%; animation: pulse-anim 2s infinite; }
        @keyframes pulse-anim { 0% { box-shadow: 0 0 0 0 rgba(192,38,211,0.7); } 70% { box-shadow: 0 0 0 10px rgba(192,38,211,0); } 100% { box-shadow: 0 0 0 0 rgba(192,38,211,0); } }
    </style>
</head>
<body>

    <!-- PRELOADER -->
    <div id="preloader">
        <div class="taxi-spinner">
            <div class="taxi-sweep"></div>
            <i class="ph-fill ph-taxi"></i>
        </div>
        <div class="cinematic-author" style="margin-top: 15px;">Taxi Radar Pro</div>
        <div style="font-size: 0.6rem; color: #555; margin-top: 5px; text-transform: uppercase; letter-spacing: 2px;">System Initializing</div>
    </div>

    <!-- START SCREEN -->
    <div id="start-screen" class="opacity-0">
        <div class="cinematic-author" style="margin-bottom: 2rem; color: #C026D3;">Slava Gordeev</div>
        <i class="ph-fill ph-radar text-demand" style="font-size: 5rem; margin-bottom: 1rem;"></i>
        <h1 style="font-size: 2.2rem; margin-bottom: 0.5rem;" class="font-bold">TAXI RADAR <span class="text-demand">PRO</span></h1>
        <p class="text-gray text-sm" style="margin-bottom: 3rem; text-align: center;">Динамический анализ зон высокого спроса.</p>
        
        <button id="btn-start" class="btn-primary">
            <i class="ph-bold ph-power"></i> Запуск радара
        </button>
        <div id="location-status" class="text-xs text-demand mt-4" style="height: 15px; font-weight: bold;"></div>
    </div>

    <!-- MAP CONTAINER -->
    <div id="map"></div>

    <!-- TOP-LEFT PANEL (Info) -->
    <div id="top-left-panel" class="glass corner-widget hide-top">
        <div class="cinematic-author" style="margin-bottom: 4px; font-size: 0.7rem; color: #C026D3;">Slava Gordeev</div>
        <div class="flex items-baseline gap-3">
            <span id="current-time" class="font-mono font-bold" style="font-size: 1.6rem; line-height: 1;">00:00</span>
        </div>
        <span id="header-city" class="text-xs text-gray font-bold" style="text-transform: uppercase; letter-spacing: 1px; display: block; margin-top: 4px;">Поиск локации...</span>
    </div>

    <!-- TOP-RIGHT PANEL (Parametrics) -->
    <div id="top-right-panel" class="glass corner-widget hide-top">
        <div id="weather-block" class="weather-badge">
            <i class="ph-fill ph-cloud-rain" style="color: #60a5fa; font-size: 1rem;"></i>
            <span>+18°C, Осадки</span>
        </div>
        <div class="flex flex-col items-end mt-1">
            <span class="text-gray font-bold" style="font-size: 0.65rem; text-transform: uppercase;">Скорость</span>
            <div class="flex items-center gap-1">
                <span id="speed-display" class="font-mono text-demand font-bold" style="font-size: 1.5rem; line-height: 1;">0</span>
                <span class="text-gray text-xs font-bold">км/ч</span>
            </div>
        </div>
    </div>

    <!-- LIVE RADAR -->
    <div id="live-radar" class="glass hide-left">
        <div class="radar-header flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="pulse-dot"></div>
                <span class="text-xs font-bold text-white uppercase tracking-wider">Live Radar</span>
            </div>
            <i class="ph-bold ph-arrows-out-line-horizontal text-gray text-xs"></i>
        </div>
        <div id="radar-messages" class="text-xs text-gray" style="line-height: 1.5;">
            Инициализация систем сканирования...
        </div>
    </div>

    <!-- FAB ACTIONS -->
    <div id="fab-actions" class="opacity-0">
        <button id="btn-show-zones" class="glass fab-btn text-white" style="display: none;">
            <i class="ph-fill ph-list-dashes"></i>
        </button>
        <button id="btn-voice" class="glass fab-btn text-demand">
            <i class="ph-fill ph-speaker-high"></i>
        </button>
        <button id="btn-locate" class="glass fab-btn text-white">
            <i class="ph-fill ph-navigation-arrow"></i>
        </button>
    </div>

    <!-- ANIMATED RADAR WIDGET (BOTTOM RIGHT) -->
    <div id="radar-widget" class="glass opacity-0">
        <div class="radar-sweep-widget"></div>
        <div class="radar-ring"></div>
        <div class="radar-ring inner"></div>
    </div>

    <!-- BOTTOM SHEET -->
    <div id="bottom-sheet" class="glass hide-bottom">
        <div class="drag-handle" id="sheet-handle">
            <div class="drag-bar"></div>
        </div>
        <h3 class="text-xs font-bold text-gray" style="text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;">Актуальные зоны спроса</h3>
        <div id="events-list" class="events-list">
            <!-- Cards Injected Here -->
        </div>
    </div>

    <!-- LEAFLET & LOGIC -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
        // === STATE & GLOBALS ===
        let baseLat = 59.4370, baseLng = 24.7536; // Default to Tallinn, Estonia if denied
        let cityName = "Локация по умолчанию";
        let map, userMarker, userCircle, activeRoute;
        let mapMarkers = {};
        let dynamicEvents = [];
        
        let isSpeaking = false;
        let sheetTimeout, radarTimeout;
        let trafficIncidentSpoken = false;
        let audioCtx;

        // === PRELOADER LOGIC ===
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('preloader').classList.add('opacity-0');
                document.getElementById('start-screen').classList.remove('opacity-0');
            }, 1800);
        });

        // === CLOCK ===
        setInterval(() => {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }, 1000);

        // === AUDIO SYNTHESIS ===
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playBeep() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(900, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1400, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.03);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        // === DYNAMIC LOCATION GENERATOR ===
        // This generates relevant mock zones around any coordinate in the world.
        function generateDynamicZones(lat, lng, city) {
            return [
                { id: 1, name: "Главный Транспортный Узел", lat: lat + 0.015, lng: lng + 0.02, priceRange: "1400–2200 ₽", intensity: 10, profile: "Приезжие, туристы", peak: "Прямо сейчас", desc: "Массовое прибытие людей. Высокий спрос на авто." },
                { id: 2, name: `Крупный ТЦ (${city.split(' ')[0]})`, lat: lat - 0.02, lng: lng + 0.01, priceRange: "800–1500 ₽", intensity: 8, profile: "Покупатели, семьи", peak: "18:00 – 21:00", desc: "Много поездок в спальные районы." },
                { id: 3, name: "Центральная площадь", lat: lat + 0.005, lng: lng - 0.015, priceRange: "1000–1800 ₽", intensity: 8.5, profile: "Офисные работники, пары", peak: "19:00 – 22:30", desc: "Деловые и развлекательные поездки." },
                { id: 4, name: "Аэропорт / Выезд из города", lat: lat + 0.08, lng: lng - 0.06, priceRange: "1800–3500 ₽", intensity: 9.5, profile: "Командировочные", peak: "Вечерние рейсы", desc: "Длинные и дорогие поездки. Возможен бизнес-класс." }
            ];
        }

        // === STARTUP & GEOLOCATION ===
        document.getElementById('btn-start').addEventListener('click', () => {
            initAudio();
            
            // Unlock Web Speech API
            const utterance = new SpeechSynthesisUtterance('');
            utterance.volume = 0;
            window.speechSynthesis.speak(utterance);

            const status = document.getElementById('location-status');
            status.innerText = "Поиск спутников...";
            document.getElementById('btn-start').style.transform = 'scale(0.95)';
            document.getElementById('btn-start').style.opacity = '0.5';
            
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    async pos => {
                        baseLat = pos.coords.latitude;
                        baseLng = pos.coords.longitude;
                        await fetchCityName(baseLat, baseLng);
                        launchApp();
                    },
                    err => {
                        console.warn("GPS failed, using fallback");
                        cityName = "Локация не определена";
                        launchApp();
                    },
                    { enableHighAccuracy: true, timeout: 6000 }
                );
            } else {
                launchApp();
            }
        });

        async function fetchCityName(lat, lng) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=10`);
                const data = await res.json();
                if(data && data.address) {
                    cityName = data.address.city || data.address.town || data.address.state || "Ваш город";
                }
            } catch(e) {
                cityName = "Текущая локация";
            }
        }

        function launchApp() {
            document.getElementById('start-screen').classList.add('opacity-0');
            
            // Generate Points based on actual location
            dynamicEvents = generateDynamicZones(baseLat, baseLng, cityName);
            document.getElementById('header-city').innerText = cityName;

            setTimeout(() => {
                document.getElementById('start-screen').classList.add('d-none');
                initMap();
                
                // Show core UI
                document.getElementById('top-left-panel').classList.remove('hide-top');
                document.getElementById('top-right-panel').classList.remove('hide-top');
                document.getElementById('fab-actions').classList.remove('opacity-0');
                document.getElementById('radar-widget').classList.remove('opacity-0');
                
                // Show temporary panels
                showLiveRadar(`Радар активирован.<br>Сканирование: ${cityName}`);
                showBottomSheet();
                
                startTracking();
                renderEventsList();
                
                // Animate Markers Sequentially
                renderMarkersSequentially();
                
                // Schedule Traffic Update (15 minutes)
                setTimeout(speakTrafficIncident, 15 * 60 * 1000);

            }, 600);
        }

        // === MAP & MARKERS ===
        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([baseLat, baseLng], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
            map.invalidateSize();
        }

        function renderMarkersSequentially() {
            let delay = 500;
            const sortedEvents = dynamicEvents.sort((a, b) => b.intensity - a.intensity);

            sortedEvents.forEach((event, index) => {
                setTimeout(() => {
                    playBeep();
                    createMarker(event);
                    showLiveRadar(`Обнаружена зона: ${event.name}`);

                    // When the last marker is placed, trigger the voice assistant
                    if (index === sortedEvents.length - 1) {
                        setTimeout(speakInitialBriefing, 1200);
                    }
                }, delay);
                delay += 800; // 800ms delay between markers
            });
        }

        function createMarker(event) {
            const radius = event.intensity * 60;
            const circle = L.circle([event.lat, event.lng], {
                color: '#C026D3', fillColor: '#C026D3', fillOpacity: 0.2, weight: 2, radius: radius, className: 'demand-zone'
            }).addTo(map);

            const btnHtml = `<button onclick="drawRoute(${event.lat}, ${event.lng})" style="width: 100%; margin-top: 12px; background: #C026D3; color: #fff; padding: 10px; border-radius: 8px; font-weight: bold;">Маршрут</button>`;

            circle.bindPopup(`
                <div class="flex justify-between items-center" style="margin-bottom: 8px;">
                    <h3 class="font-bold text-white" style="font-size: 1.1rem; max-width: 70%;">${event.name}</h3>
                    <span class="price-tag">${event.priceRange}</span>
                </div>
                <p class="text-xs text-gray" style="margin-bottom: 12px; text-transform: uppercase;">${event.profile}</p>
                <div style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; border-left: 2px solid #C026D3; font-size: 0.8rem; font-style: italic; color: #d4d4d8;">
                    ${event.desc}
                </div>
                ${btnHtml}
            `);
            mapMarkers[event.id] = circle;
        }

        window.drawRoute = function(lat, lng) {
            if (!userMarker) return;
            if (activeRoute) map.removeLayer(activeRoute);
            const uPos = userMarker.getLatLng();
            
            activeRoute = L.polyline([[uPos.lat, uPos.lng], [lat, lng]], {
                color: '#C026D3', weight: 4, dashArray: '8, 10', className: 'route-line'
            }).addTo(map);
            map.fitBounds(activeRoute.getBounds(), { padding: [50, 50], maxZoom: 14 });
            hideBottomSheet();
        }

        // === UI AUTO-HIDE & SWIPE ===
        function showBottomSheet() {
            const sheet = document.getElementById('bottom-sheet');
            sheet.classList.remove('hide-bottom');
            document.getElementById('btn-show-zones').style.display = 'none';
            
            clearTimeout(sheetTimeout);
            sheetTimeout = setTimeout(hideBottomSheet, 8000);
        }

        function hideBottomSheet() {
            document.getElementById('bottom-sheet').classList.add('hide-bottom');
            document.getElementById('btn-show-zones').style.display = 'flex';
        }

        document.getElementById('btn-show-zones').addEventListener('click', showBottomSheet);

        let sheetStartY = 0;
        const sheetHandle = document.getElementById('sheet-handle');
        
        sheetHandle.addEventListener('touchstart', e => {
            sheetStartY = e.touches[0].clientY;
            clearTimeout(sheetTimeout); 
        }, {passive: true});

        sheetHandle.addEventListener('touchmove', e => {
            if (e.touches[0].clientY - sheetStartY > 40) hideBottomSheet();
        }, {passive: true});

        function showLiveRadar(msg) {
            const radar = document.getElementById('live-radar');
            document.getElementById('radar-messages').innerHTML = msg;
            radar.classList.remove('hide-left');
            
            clearTimeout(radarTimeout);
            radarTimeout = setTimeout(() => radar.classList.add('hide-left'), 8000);
        }
        
        let radarStartX = 0;
        const radarPanel = document.getElementById('live-radar');
        radarPanel.addEventListener('touchstart', e => radarStartX = e.touches[0].clientX, {passive:true});
        radarPanel.addEventListener('touchmove', e => {
            if (radarStartX - e.touches[0].clientX > 40) radarPanel.classList.add('hide-left');
        }, {passive:true});

        // Lists
        function renderEventsList() {
            const list = document.getElementById('events-list');
            list.innerHTML = '';
            
            dynamicEvents.forEach(e => {
                const card = document.createElement('div');
                card.className = "event-card";
                card.innerHTML = `
                    <div class="flex justify-between items-center" style="margin-bottom: 6px;">
                        <h4 class="font-bold text-white text-sm truncate" style="max-width: 60%;">${e.name}</h4>
                        <span class="price-tag">${e.priceRange}</span>
                    </div>
                    <div class="flex items-center gap-4 text-xs text-gray">
                        <span><i class="ph-fill ph-clock"></i> ${e.peak}</span>
                    </div>
                `;
                card.onclick = () => { drawRoute(e.lat, e.lng); mapMarkers[e.id].openPopup(); };
                list.appendChild(card);
            });
        }

        // === VOICE ASSISTANT ===
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function speak(text) {
            if (!('speechSynthesis' in window) || isSpeaking) return;
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ru-RU'; u.rate = 1.05; u.pitch = 0.95;
            
            const voices = window.speechSynthesis.getVoices();
            const ruVoice = voices.find(v => v.lang === 'ru-RU' && (v.name.includes('Google') || v.name.includes('Premium')));
            if (ruVoice) u.voice = ruVoice;
            
            u.onstart = () => {
                isSpeaking = true;
                document.getElementById('btn-voice').style.background = '#C026D3';
                document.getElementById('btn-voice').style.color = '#fff';
            };
            u.onend = () => {
                isSpeaking = false;
                document.getElementById('btn-voice').style.background = '';
                document.getElementById('btn-voice').style.color = '#C026D3';
            };
            window.speechSynthesis.speak(u);
        }

        function speakInitialBriefing() {
            let closestEvent = null;
            let minD = Infinity;
            dynamicEvents.forEach(e => {
                const d = getDistance(baseLat, baseLng, e.lat, e.lng);
                if(d < minD) { minD = d; closestEvent = e; }
            });

            if (closestEvent) {
                const text = `Карта загружена. Ближайшая к вам зона с высоким спросом — ${closestEvent.name}. Ожидаемый заработок до ${closestEvent.priceRange.replace('₽', 'рублей')}.`;
                speak(text);
                showLiveRadar(`🗣️ Голосовой помощник:<br>Ближайшая зона — ${closestEvent.name}`);
            }
        }

        function speakTrafficIncident() {
            if(trafficIncidentSpoken) return; 
            const incident = "Внимание: Зафиксировано ухудшение погодных условий. Возможны заторы на основных магистралях.";
            speak(incident);
            showLiveRadar(`⚠️ Дорожная сводка:<br>${incident}`);
            trafficIncidentSpoken = true;
        }

        document.getElementById('btn-voice').addEventListener('click', () => {
            if (isSpeaking) { 
                window.speechSynthesis.cancel(); 
                isSpeaking = false;
                document.getElementById('btn-voice').style.background = '';
                document.getElementById('btn-voice').style.color = '#C026D3';
            } else {
                let closestEvent = dynamicEvents[0];
                let minD = Infinity;
                dynamicEvents.forEach(e => {
                    const d = getDistance(baseLat, baseLng, e.lat, e.lng);
                    if(d < minD) { minD = d; closestEvent = e; }
                });
                speak(`Ближайшая прибыльная зона: ${closestEvent.name}.`);
                showLiveRadar(`🗣️ ${closestEvent.name}`);
            }
        });

        // === GPS TRACKING ===
        const carIconUrl = `data:image/svg+xml;base64,${btoa('<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 256 256"><circle cx="128" cy="128" r="128" fill="rgba(255,255,255,0.15)"/><path d="M240,112H216V72a16,16,0,0,0-16-16H56A16,16,0,0,0,40,72v40H16a8,8,0,0,0,0,16H240a8,8,0,0,0,0-16Z" fill="#fff"/><path d="M208,128H48v56a16,16,0,0,0,16,16h16v16a8,8,0,0,0,16,0V200h64v16a8,8,0,0,0,16,0V200h16a16,16,0,0,0,16-16Z" fill="#fff"/><circle cx="84" cy="164" r="12" fill="#000"/><circle cx="172" cy="164" r="12" fill="#000"/></svg>')}`;
        const carIcon = L.icon({ iconUrl: carIconUrl, iconSize: [32, 32], iconAnchor: [16, 16] });

        function startTracking() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(pos => {
                    baseLat = pos.coords.latitude; baseLng = pos.coords.longitude;
                    
                    if (pos.coords.speed !== null) {
                        document.getElementById('speed-display').innerText = Math.round(pos.coords.speed * 3.6);
                    }

                    if (!userMarker) {
                        userMarker = L.marker([baseLat, baseLng], { icon: carIcon, zIndexOffset: 2000 }).addTo(map);
                        userCircle = L.circle([baseLat, baseLng], { radius: pos.coords.accuracy / 2, color: '#fff', weight: 1, fillOpacity: 0.15 }).addTo(map);
                    } else {
                        userMarker.setLatLng([baseLat, baseLng]);
                        userCircle.setLatLng([baseLat, baseLng]);
                        userCircle.setRadius(pos.coords.accuracy / 2);
                    }
                }, () => {}, { enableHighAccuracy: true, maximumAge: 2000 });
            }
        }

        document.getElementById('btn-locate').addEventListener('click', () => {
            if (userMarker) map.flyTo(userMarker.getLatLng(), 14, { duration: 1 });
        });
    </script>
</body>
</html>
