<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Demand Map | Premium Taxi Radar</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        demand: '#C026D3',
                        demandDark: '#86198f',
                        glass: 'rgba(24, 24, 27, 0.75)',
                    },
                    animation: {
                        'ping-slow': 'ping 3s cubic-bezier(0, 0, 0.2, 1) infinite',
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* Базовые сбросы для мобильных приложений */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; overscroll-behavior-y: none; background-color: #050505; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* Премиальный Glassmorphism */
        .glass-panel {
            background: rgba(24, 24, 27, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Leaflet Overrides (Скрываем лишнее, стилизуем попапы) */
        .leaflet-control-attribution, .leaflet-control-zoom { display: none !important; }
        
        .leaflet-popup-content-wrapper {
            background: rgba(18, 18, 22, 0.95) !important;
            backdrop-filter: blur(25px) !important;
            -webkit-backdrop-filter: blur(25px) !important;
            border: 1px solid rgba(192, 38, 211, 0.4) !important;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 25px rgba(192, 38, 211, 0.15) !important;
            color: #fff !important;
            border-radius: 1.25rem !important;
            padding: 0 !important;
        }
        .leaflet-popup-tip-container { display: none; }
        .leaflet-popup-content { margin: 0 !important; min-width: 300px; }
        .leaflet-container a.leaflet-popup-close-button { color: #a1a1aa; padding: 16px; z-index: 10; font-size: 22px; }

        /* Красивые Tooltips при наведении на круги */
        .glass-tooltip {
            background: rgba(20, 20, 24, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(192, 38, 211, 0.7);
            color: white;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(192, 38, 211, 0.3);
            padding: 8px 14px;
            font-weight: 700;
            font-size: 14px;
            text-align: center;
        }
        .leaflet-tooltip-top:before { border-top-color: rgba(192, 38, 211, 0.7); }

        /* Анимация кругов (Мерцание / Shimmer) */
        .demand-zone {
            transition: fill-opacity 0.4s ease, stroke-width 0.4s ease;
            transform-origin: center;
            animation: circle-pulse 3s infinite alternate ease-in-out;
        }
        @keyframes circle-pulse {
            0% { fill-opacity: 0.15; filter: drop-shadow(0 0 5px rgba(192,38,211,0.2)); }
            100% { fill-opacity: 0.5; filter: drop-shadow(0 0 20px rgba(192,38,211,0.7)); }
        }

        /* Анимация маршрута (Бегущая линия) */
        .route-line { animation: route-dash 1.5s linear infinite; }
        @keyframes route-dash { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }

        /* Новый технологичный Glass-Радар */
        .radar-glass {
            position: absolute;
            bottom: 38vh; right: 20px;
            width: 110px; height: 110px;
            border-radius: 50%;
            background: rgba(15, 15, 18, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(192, 38, 211, 0.3);
            box-shadow: 0 0 30px rgba(192, 38, 211, 0.15), inset 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden; z-index: 400; pointer-events: none;
            transition: opacity 0.5s ease;
        }
        /* Внутренние кольца радара */
        .radar-glass::before, .radar-glass::after {
            content: ''; position: absolute; border-radius: 50%;
            border: 1px solid rgba(192, 38, 211, 0.2);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .radar-glass::before { width: 35px; height: 35px; }
        .radar-glass::after { width: 75px; height: 75px; }
        /* Крутящийся градиент радара */
        .radar-scanner {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: conic-gradient(from 0deg, rgba(192,38,211,0) 0deg, rgba(192,38,211,0) 280deg, rgba(192,38,211,0.7) 360deg);
            animation: radar-spin 2.5s linear infinite;
        }
        @keyframes radar-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Анимация чата */
        .chat-msg { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-zinc-100 h-screen w-screen flex flex-col relative">

    <!-- START SCREEN -->
    <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-zinc-950 z-[9999] transition-opacity duration-700">
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-demand/20 via-zinc-950 to-zinc-950"></div>
        <div class="relative z-10 text-center px-6 flex flex-col items-center w-full max-w-sm">
            <div class="w-28 h-28 rounded-full bg-demand/10 border border-demand/30 flex items-center justify-center mb-8 shadow-[0_0_60px_rgba(192,38,211,0.3)]">
                <i class="ph-fill ph-radar text-demand text-6xl animate-pulse"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tighter mb-3">DEMAND <span class="text-demand">PRO</span></h1>
            <p id="start-status" class="text-zinc-400 mb-12 text-sm font-medium h-10 px-4 leading-relaxed">
                Закрытая инсайдерская сеть спроса.<br>Анализ реальных событий на сегодня.
            </p>
            
            <button id="btn-start-shift" class="relative group overflow-hidden bg-white text-black font-bold py-5 px-14 rounded-full text-xl transition-all transform active:scale-95 shadow-[0_0_30px_rgba(255,255,255,0.2)] w-full">
                <div class="absolute inset-0 w-full h-full bg-demand transition-all duration-300 ease-out transform -translate-x-full group-hover:translate-x-0"></div>
                <span class="relative group-hover:text-white flex items-center justify-center gap-3">
                    <i class="ph-bold ph-power"></i> Начать смену
                </span>
            </button>
        </div>
    </div>

    <!-- HEADER (LIVE PARAMS) -->
    <header class="absolute top-0 left-0 right-0 z-[1000] p-3 pointer-events-none transition-transform duration-500 -translate-y-full" id="main-header">
        <div class="glass-panel rounded-2xl p-3.5 flex justify-between items-center pointer-events-auto">
            <div class="flex items-center gap-3">
                <div class="flex flex-col">
                    <div class="flex items-center gap-1.5 mb-1">
                        <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                        <span id="header-city" class="text-[10px] text-zinc-300 font-bold uppercase tracking-widest truncate max-w-[120px]">Поиск...</span>
                    </div>
                    <span id="shift-timer" class="font-mono text-demand font-black text-xl leading-none">00:00:00</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right flex flex-col items-end">
                    <span class="text-[10px] text-zinc-400 font-bold uppercase tracking-widest mb-1">Скорость</span>
                    <div class="flex items-baseline gap-1">
                        <span id="speed-display" class="font-mono text-white font-black text-xl leading-none">0</span>
                        <span class="text-xs text-zinc-500 font-bold">км/ч</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- LIVE EVENT CHAT -->
    <div id="event-chat" class="absolute top-24 left-3 z-[500] w-64 max-h-52 glass-panel rounded-2xl flex flex-col pointer-events-auto transition-transform duration-700 transform -translate-x-[150%] opacity-0">
        <div class="bg-zinc-900/80 px-3.5 py-2.5 border-b border-zinc-700/50 rounded-t-2xl flex items-center gap-2">
            <i class="ph-fill ph-broadcast text-demand text-lg animate-pulse"></i>
            <span class="text-xs font-black text-white tracking-wider uppercase">Live Радар</span>
        </div>
        <div id="chat-messages" class="overflow-y-auto p-2.5 space-y-2.5 flex flex-col-reverse h-36 text-xs"></div>
    </div>

    <!-- FLOATING ACTIONS -->
    <div class="absolute top-24 right-3 z-[400] flex flex-col gap-3 transition-transform duration-700 transform translate-x-[150%]" id="floating-actions">
        <button id="btn-voice-update" class="glass-panel p-4 rounded-full text-demand hover:text-white hover:bg-demand active:scale-90 transition-all shadow-lg flex items-center justify-center">
            <i class="ph-fill ph-speaker-high text-2xl"></i>
        </button>
        <button id="locate-btn" class="glass-panel p-4 rounded-full text-white hover:bg-zinc-700 active:scale-90 transition-all shadow-lg flex items-center justify-center">
            <i class="ph-fill ph-navigation-arrow text-2xl"></i>
        </button>
    </div>

    <!-- MAP CONTAINER -->
    <div class="flex-grow relative h-full w-full bg-[#0a0a0c]">
        <div id="map" class="absolute inset-0 z-0"></div>
        
        <!-- NEW SLEEK RADAR -->
        <div class="radar-glass opacity-0" id="radar-ui">
            <div class="radar-scanner"></div>
            <div class="absolute inset-0 flex items-center justify-center opacity-30">
                <div class="w-full h-px bg-demand"></div>
                <div class="h-full w-px bg-demand absolute"></div>
            </div>
        </div>
    </div>

    <!-- BOTTOM SHEET (ZONES LIST) -->
    <div class="absolute bottom-0 left-0 right-0 z-[1000] flex flex-col pointer-events-none">
        
        <!-- Filters Area -->
        <div class="w-full overflow-x-auto pb-4 pt-4 px-3 scroll-smooth pointer-events-auto hide-scrollbar transition-transform duration-700 translate-y-[200%]" id="filters-wrapper">
            <div class="flex gap-2.5" id="filters-container">
                <button class="filter-btn active bg-demand text-white px-5 py-2.5 rounded-full text-sm font-bold whitespace-nowrap shadow-[0_0_15px_rgba(192,38,211,0.5)]" data-filter="all">Все зоны</button>
                <button class="filter-btn glass-btn text-zinc-300 px-5 py-2.5 rounded-full text-sm font-bold whitespace-nowrap" data-filter="Мероприятие">События (Афиша)</button>
                <button class="filter-btn glass-btn text-zinc-300 px-5 py-2.5 rounded-full text-sm font-bold whitespace-nowrap" data-filter="Трансфер">Аэропорт</button>
                <button class="filter-btn glass-btn text-zinc-300 px-5 py-2.5 rounded-full text-sm font-bold whitespace-nowrap" data-filter="Вокзал">Вокзалы</button>
            </div>
        </div>

        <!-- The Sheet -->
        <div class="glass-panel rounded-t-[2rem] border-b-0 h-[38vh] flex flex-col pointer-events-auto transition-transform duration-500 transform translate-y-full" id="bottom-sheet">
            <div class="w-full flex justify-center py-4 shrink-0">
                <div class="w-16 h-1.5 bg-zinc-600 rounded-full"></div>
            </div>
            <div id="events-list" class="flex-grow overflow-y-auto px-4 pb-8 space-y-3.5">
                <!-- Cards will be injected here -->
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
        // --- 1. CORE DATA (REAL EVENTS FOR JUNE 24, 2026) ---
        const currentDateObj = new Date();
        const CURRENT_DATE_STRING = `${currentDateObj.getFullYear()}-${String(currentDateObj.getMonth() + 1).padStart(2, '0')}-${String(currentDateObj.getDate()).padStart(2, '0')}`;
        
        let currentCityName = "Новосибирск";
        let baseLat = 55.0302;
        let baseLng = 82.9204;

        // Реальные события, собранные из афиши на 24 июня 2026 г.
        const dbEvents = [
            { id: 1, type: "Мероприятие", name: "Опера «Риголетто» (НОВАТ)", eventDate: CURRENT_DATE_STRING, lat: 55.0304, lng: 82.9245, priceRange: "1400–2500 ₽", intensity: 9.5, profile: "Театралы, состоятельная публика", peak: "21:30 – 22:30", insider: "Окончание масштабной оперы. Огромный спрос на классы Комфорт+ и Бизнес." },
            { id: 2, type: "Мероприятие", name: "Спектакль «Сиротливый запад»", eventDate: CURRENT_DATE_STRING, lat: 55.0088, lng: 82.9365, priceRange: "900–1600 ₽", intensity: 8, profile: "Молодёжь, студенты, пары", peak: "21:00 – 22:00", insider: "Театр 'Старый дом'. Заказы в основном распределяются по правому берегу." },
            { id: 3, type: "Мероприятие", name: "Джаз «Снова лето на дворе»", eventDate: CURRENT_DATE_STRING, lat: 55.0234, lng: 82.9238, priceRange: "1000–1800 ₽", intensity: 8.5, profile: "Взрослая аудитория, любители музыки", peak: "20:30 – 21:30", insider: "Концерт Сибирского диксиленда. Подача машины к филармонии." },
            { id: 4, type: "Мероприятие", name: "«Последние романтики»", eventDate: CURRENT_DATE_STRING, lat: 54.8385, lng: 83.0976, priceRange: "1800–3500 ₽", intensity: 10, profile: "Ученые, состоятельные жители", peak: "21:00 – 22:00", insider: "Летний дворик Дома Учёных (Академгородок). Дальние поездки в город. Очень высокий чек." },
            { id: 5, type: "Трансфер", name: "Аэропорт Толмачёво", eventDate: CURRENT_DATE_STRING, lat: 55.0125, lng: 82.6655, priceRange: "1500–2800 ₽", intensity: 9, profile: "Командировочные, туристы", peak: "18:00 – 21:30", insider: "Прибытие нескольких вечерних рейсов подряд. Рекомендуется подача на 2 линию." },
            { id: 6, type: "Вокзал", name: "Новосибирск-Главный", eventDate: CURRENT_DATE_STRING, lat: 55.0355, lng: 82.8981, priceRange: "800–1400 ₽", intensity: 7.5, profile: "Пассажиры с багажом, семьи", peak: "18:30 – 20:30", insider: "Много поездов с восточного направления." }
        ];

        let map, userMarker, userCircle;
        let todayEvents = [];
        let mapMarkers = {};
        let activeRouteLine = null;
        let shiftStartTime = null;
        let audioCtx;
        let isSpeaking = false;

        // Синтез технологичного звука
        function playTechBeep(type = 'normal') {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                
                osc.type = type === 'high' ? 'triangle' : 'sine'; 
                const freq = type === 'high' ? 1200 : 880;
                
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(freq*1.5, audioCtx.currentTime + 0.1); 
                
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } catch(e) {}
        }

        // --- 2. STARTUP FLOW & GEOLOCATION ---

        document.getElementById('btn-start-shift').addEventListener('click', () => {
            playTechBeep();
            
            // Unlocking Web Speech API on mobile user gesture
            const unlockUtterance = new SpeechSynthesisUtterance('');
            unlockUtterance.volume = 0;
            window.speechSynthesis.speak(unlockUtterance);

            const btn = document.getElementById('btn-start-shift');
            const status = document.getElementById('start-status');
            btn.classList.add('hidden');
            status.innerHTML = '<i class="ph-bold ph-spinner animate-spin inline-block mr-2 text-demand"></i> Синхронизация со спутниками...';

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    async (pos) => {
                        await setupCityAndData(pos.coords.latitude, pos.coords.longitude);
                        launchMainUI(pos.coords.latitude, pos.coords.longitude);
                    },
                    (err) => {
                        console.warn("GPS error", err);
                        setupCityAndData(baseLat, baseLng, true);
                        launchMainUI(baseLat, baseLng);
                    },
                    { timeout: 5000, enableHighAccuracy: true }
                );
            } else {
                setupCityAndData(baseLat, baseLng, true);
                launchMainUI(baseLat, baseLng);
            }
        });

        async function setupCityAndData(lat, lng, isDefault = false) {
            // Геокодинг для определения города
            if (!isDefault) {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=10`);
                    const data = await res.json();
                    if(data && data.address) {
                        currentCityName = data.address.city || data.address.town || "Город определен";
                    }
                    
                    // Адаптация координат (сдвиг событий к текущему городу пользователя)
                    const latDiff = lat - baseLat;
                    const lngDiff = lng - baseLng;
                    dbEvents.forEach(e => { e.lat += latDiff; e.lng += lngDiff; });
                    
                    baseLat = lat;
                    baseLng = lng;
                } catch(e) { currentCityName = "Локация определена"; }
            } else {
                currentCityName = "Новосибирск";
            }

            document.getElementById('header-city').innerText = currentCityName;
            
            todayEvents = dbEvents.filter(e => e.eventDate === CURRENT_DATE_STRING);
            todayEvents.sort((a, b) => b.intensity - a.intensity);
        }

        function launchMainUI(startLat, startLng) {
            const startScreen = document.getElementById('start-screen');
            startScreen.classList.add('opacity-0');
            
            setTimeout(() => {
                startScreen.classList.add('hidden');
                
                // Раскрытие UI элементов
                document.getElementById('main-header').classList.remove('-translate-y-full');
                document.getElementById('bottom-sheet').classList.remove('translate-y-full');
                document.getElementById('filters-wrapper').classList.remove('translate-y-[200%]');
                document.getElementById('floating-actions').classList.remove('translate-x-[150%]');
                document.getElementById('event-chat').classList.remove('-translate-x-[150%]', 'opacity-0');
                document.getElementById('radar-ui').classList.remove('opacity-0');
                
                // Инициализация карты (Близкий зум на пользователя)
                map = L.map('map', { zoomControl: false, attributionControl: false }).setView([startLat, startLng], 15);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
                
                map.invalidateSize();
                startShiftTimer();
                startTracking();
                renderList(todayEvents);
                
                // КИНЕМАТОГРАФИЧНАЯ АНИМАЦИЯ: Отдаление камеры -> Появление точек
                addChatMessage("Геолокация установлена. Сканирование города...", false);
                
                setTimeout(() => {
                    // Плавный отлет на уровень города
                    map.flyTo([baseLat, baseLng], 11, { duration: 2.5, easeLinearity: 0.1 }); 
                    
                    setTimeout(() => {
                        runSequentialAnimation(); // Появление точек
                    }, 2600); // Ждем завершения flyTo
                }, 1500);

            }, 700);
        }

        // --- 3. SEQUENTIAL MARKERS (L.circle) ---

        function addChatMessage(text, highlight = false) {
            const chat = document.getElementById('chat-messages');
            const msg = document.createElement('div');
            msg.className = `chat-msg p-2.5 rounded-xl border-l-2 mb-2 ${highlight ? 'border-demand bg-demand/15 text-white' : 'border-zinc-500 bg-zinc-800/60 text-zinc-300'}`;
            const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            msg.innerHTML = `<span class="text-[10px] text-zinc-500 mr-2 font-mono">${time}</span> ${text}`;
            chat.prepend(msg);
        }

        function runSequentialAnimation() {
            let delay = 0;

            todayEvents.forEach((event, index) => {
                setTimeout(() => {
                    playTechBeep('high');
                    createCustomMarker(event);
                    addChatMessage(`Найдена зона: <b>${event.name}</b> (${event.priceRange})`, event.intensity >= 9);

                    // Когда добавлена последняя точка - включаем голос
                    if (index === todayEvents.length - 1) {
                        setTimeout(() => {
                            addChatMessage("Карта спроса загружена полностью.", false);
                            announceCurrentUpdates(true);
                            
                            // Периодическое голосовое обновление (15 мин)
                            setInterval(() => announceCurrentUpdates(false), 15 * 60 * 1000);
                        }, 1200);
                    }
                }, delay);
                delay += 700; // Плавное появление одной за другой
            });
        }

        function createCustomMarker(event) {
            if (mapMarkers[event.id]) return;
            
            // Радиус в метрах зависит от intensity
            const radiusMeters = event.intensity * 60; 

            const circle = L.circle([event.lat, event.lng], {
                color: '#C026D3',
                fillColor: '#C026D3',
                fillOpacity: 0.1, // Изменится CSS анимацией
                weight: 2,
                radius: radiusMeters,
                className: 'demand-zone'
            }).addTo(map);

            circle.bindTooltip(`
                <div class="text-[10px] uppercase text-demand tracking-widest mb-1">${event.type}</div>
                <div class="font-black text-white text-sm">${event.name}</div>
                <div class="text-demand mt-1 bg-demand/20 inline-block px-2 rounded font-bold">${event.priceRange}</div>
            `, {
                direction: 'top',
                className: 'glass-tooltip'
            });

            const buildRouteHtml = () => {
                const uLat = userMarker ? userMarker.getLatLng().lat : '';
                const uLng = userMarker ? userMarker.getLatLng().lng : '';
                const url = uLat ? `https://yandex.ru/maps/?rtext=${uLat},${uLng}~${event.lat},${event.lng}&rtt=auto` 
                                 : `https://yandex.ru/maps/?rtext=~${event.lat},${event.lng}&rtt=auto`;
                
                return `<a href="${url}" target="_blank" class="block w-full mt-4 bg-demand text-white text-center py-3.5 rounded-2xl font-bold shadow-[0_0_20px_rgba(192,38,211,0.5)] active:scale-95 transition-transform decoration-none text-lg">Построить маршрут</a>`;
            };

            circle.bindPopup(() => {
                return `
                    <div class="p-5 w-full text-white">
                        <div class="flex justify-between items-start border-b border-white/10 pb-4 mb-4">
                            <div>
                                <span class="text-[10px] uppercase tracking-widest text-demand font-black">${event.type}</span>
                                <h3 class="text-xl font-black leading-tight mt-1">${event.name}</h3>
                            </div>
                            <div class="bg-demand/20 border border-demand/50 px-3 py-2 rounded-xl text-demand font-bold whitespace-nowrap ml-4 shadow-inner">
                                ${event.priceRange}
                            </div>
                        </div>
                        <div class="space-y-4 text-sm mt-4">
                            <div class="flex items-start gap-3">
                                <div class="bg-white/10 p-2 rounded-xl shrink-0"><i class="ph-fill ph-users text-demand text-lg"></i></div>
                                <span class="leading-snug mt-0.5"><span class="text-zinc-500 font-bold block mb-1 text-[10px] uppercase">Профиль клиентов</span> ${event.profile}</span>
                            </div>
                            <div class="flex items-start gap-3">
                                <div class="bg-white/10 p-2 rounded-xl shrink-0"><i class="ph-fill ph-clock text-demand text-lg"></i></div>
                                <span class="leading-snug mt-0.5"><span class="text-zinc-500 font-bold block mb-1 text-[10px] uppercase">Пиковые часы</span> ${event.peak}</span>
                            </div>
                            <div class="mt-5 bg-zinc-900/90 border border-demand/40 p-4 rounded-2xl text-zinc-300 relative overflow-hidden shadow-lg">
                                <div class="absolute top-0 left-0 w-1.5 h-full bg-demand"></div>
                                <span class="text-demand font-black text-[11px] uppercase block mb-1.5 tracking-wider">Инсайд</span>
                                <span class="italic leading-relaxed text-sm">"${event.insider}"</span>
                            </div>
                        </div>
                        ${buildRouteHtml()}
                    </div>
                `;
            });

            // Interaction logic
            circle.on('mouseover', function() { this.setStyle({ weight: 4 }); });
            circle.on('mouseout', function() { this.setStyle({ weight: 2 }); });
            circle.on('click', function() { drawRouteToEvent(event.lat, event.lng); });
            
            mapMarkers[event.id] = circle;
        }

        function drawRouteToEvent(targetLat, targetLng) {
            if (!userMarker) return;
            if (activeRouteLine) map.removeLayer(activeRouteLine);
            
            const startLat = userMarker.getLatLng().lat;
            const startLng = userMarker.getLatLng().lng;

            activeRouteLine = L.polyline([[startLat, startLng], [targetLat, targetLng]], {
                color: '#C026D3', weight: 4, opacity: 0.9, dashArray: '10, 12', className: 'route-line'
            }).addTo(map);

            // Анимационный зум, чтобы было видно маршрут
            map.flyToBounds(activeRouteLine.getBounds(), { padding: [60, 60], maxZoom: 13, duration: 1.2 });
        }

        // --- 4. VOICE ASSISTANT ---

        function announceCurrentUpdates(isStartup = false) {
            if (!('speechSynthesis' in window) || isSpeaking) return;
            
            // Фильтруем топ-2 события по интенсивности
            const topPoints = todayEvents.slice(0, 2);
            if (topPoints.length === 0) return;

            let textToSpeak = isStartup ? 
                `Инсайдерский радар загружен. ` : 
                `Сводка обновления на сейчас. `;
                
            textToSpeak += `Самый высокий заработок ожидается в зоне ${topPoints[0].name}, чек до ${topPoints[0].priceRange.replace('₽', 'рублей')}. `;
            if (topPoints[1]) textToSpeak += `Также обратите внимание на локацию ${topPoints[1].name}.`;

            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'ru-RU';
            utterance.rate = 1.05; 
            utterance.pitch = 0.95; 

            // Попытка найти качественный голос
            const voices = window.speechSynthesis.getVoices();
            const ruVoice = voices.find(v => v.lang === 'ru-RU' && (v.name.includes('Google') || v.name.includes('Premium') || v.name.includes('Yuri') || v.name.includes('Milena')));
            if (ruVoice) utterance.voice = ruVoice;

            utterance.onstart = () => {
                isSpeaking = true;
                document.getElementById('btn-voice-update').classList.add('animate-pulse', 'bg-demand', 'text-white');
                addChatMessage("Воспроизводится голосовая сводка...", true);
            };
            utterance.onend = () => {
                isSpeaking = false;
                document.getElementById('btn-voice-update').classList.remove('animate-pulse', 'bg-demand', 'text-white');
            };
            utterance.onerror = () => { isSpeaking = false; };

            window.speechSynthesis.speak(utterance);
        }

        document.getElementById('btn-voice-update').addEventListener('click', () => {
            if(isSpeaking) {
                window.speechSynthesis.cancel();
                isSpeaking = false;
                document.getElementById('btn-voice-update').classList.remove('animate-pulse', 'bg-demand', 'text-white');
            } else {
                announceCurrentUpdates(false);
            }
        });

        // Chrome/Safari hack for voices loading
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }

        // --- 5. UI LIST & FILTERS ---

        function renderList(events) {
            const list = document.getElementById('events-list');
            list.innerHTML = '';
            
            if(events.length === 0) {
                list.innerHTML = '<p class="text-center text-zinc-500 mt-6 text-sm">В этой категории нет активных зон.</p>';
                return;
            }

            events.forEach(event => {
                const card = document.createElement('div');
                card.className = "bg-zinc-800/50 border border-zinc-700/50 rounded-[1.25rem] p-4 active:bg-zinc-700 transition-colors flex flex-col relative overflow-hidden group cursor-pointer shadow-md";
                card.innerHTML = `
                    <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-demand opacity-70"></div>
                    <div class="flex justify-between items-start mb-2.5 pl-3 gap-2">
                        <div>
                            <span class="text-[10px] text-zinc-400 font-bold uppercase tracking-wider">${event.type}</span>
                            <h4 class="font-bold text-white text-base leading-tight mt-0.5">${event.name}</h4>
                        </div>
                        <span class="bg-demand/20 text-demand font-bold text-sm px-2.5 py-1.5 rounded-xl border border-demand/30 whitespace-nowrap shadow-sm">
                            ${event.priceRange}
                        </span>
                    </div>
                    <p class="text-xs text-zinc-300 pl-3 line-clamp-1 mb-1.5"><i class="ph-fill ph-users mr-1.5 text-zinc-500"></i>${event.profile}</p>
                    <p class="text-xs text-demand pl-3 font-mono font-bold"><i class="ph-fill ph-clock mr-1.5"></i>${event.peak}</p>
                `;
                
                card.onclick = () => {
                    drawRouteToEvent(event.lat, event.lng);
                    setTimeout(() => mapMarkers[event.id].openPopup(), 600);
                };
                list.appendChild(card);
            });
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('active', 'bg-demand', 'text-white', 'shadow-[0_0_15px_rgba(192,38,211,0.5)]');
                    b.classList.add('glass-btn', 'text-zinc-300');
                });
                const target = e.target;
                target.classList.remove('glass-btn', 'text-zinc-300');
                target.classList.add('active', 'bg-demand', 'text-white', 'shadow-[0_0_15px_rgba(192,38,211,0.5)]');

                const filter = target.dataset.filter;
                const filtered = filter === 'all' ? todayEvents : todayEvents.filter(ev => ev.type === filter);
                renderList(filtered);
            });
        });

        // --- 6. GEOLOCATION TRACKING ---

        function startShiftTimer() {
            shiftStartTime = Date.now();
            setInterval(() => {
                const diff = Date.now() - shiftStartTime;
                const hrs = String(Math.floor((diff / (1000 * 60 * 60)) % 24)).padStart(2, '0');
                const mins = String(Math.floor((diff / 1000 / 60) % 60)).padStart(2, '0');
                const secs = String(Math.floor((diff / 1000) % 60)).padStart(2, '0');
                document.getElementById('shift-timer').innerText = `${hrs}:${mins}:${secs}`;
            }, 1000);
        }

        const carSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 256 256"><circle cx="128" cy="128" r="128" fill="rgba(255,255,255,0.2)"/><path d="M240,112H216V72a16,16,0,0,0-16-16H56A16,16,0,0,0,40,72v40H16a8,8,0,0,0,0,16H240a8,8,0,0,0,0-16Z" fill="#fff"/><path d="M208,128H48v56a16,16,0,0,0,16,16h16v16a8,8,0,0,0,16,0V200h64v16a8,8,0,0,0,16,0V200h16a16,16,0,0,0,16-16Z" fill="#fff"/><circle cx="84" cy="164" r="14" fill="#000"/><circle cx="172" cy="164" r="14" fill="#000"/></svg>`;
        const userIcon = L.icon({ iconUrl: `data:image/svg+xml;base64,${btoa(carSvg)}`, iconSize: [40, 40], iconAnchor: [20, 20] });

        function startTracking() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const speed = pos.coords.speed;
                    
                    if (speed !== null) {
                        document.getElementById('speed-display').innerText = Math.round(speed * 3.6);
                    }

                    if (!userMarker) {
                        userMarker = L.marker([lat, lng], { icon: userIcon, zIndexOffset: 2000 }).addTo(map);
                        userCircle = L.circle([lat, lng], { radius: pos.coords.accuracy / 2, color: '#fff', weight: 1, fillOpacity: 0.15 }).addTo(map);
                    } else {
                        userMarker.setLatLng([lat, lng]);
                        userCircle.setLatLng([lat, lng]);
                        userCircle.setRadius(pos.coords.accuracy / 2);
                    }
                }, () => {}, { enableHighAccuracy: true, maximumAge: 2000 });
            }
        }

        document.getElementById('locate-btn').addEventListener('click', () => {
            if (userMarker) {
                map.flyTo(userMarker.getLatLng(), 15, { duration: 1 });
            }
        });

    </script>
</body>
</html>
